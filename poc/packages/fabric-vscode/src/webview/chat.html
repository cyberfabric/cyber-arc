<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'nonce-{{nonce}}'; script-src 'nonce-{{nonce}}';">
  <title>Cyber Fabric Chat</title>
  <style nonce="{{nonce}}">
    body {
      margin: 0;
      padding: 0;
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .message {
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 85%;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      background: var(--vscode-input-background);
      margin-left: auto;
    }

    .message.assistant {
      background: var(--vscode-badge-background);
      color: var(--vscode-badge-foreground);
    }

    #input-area {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid var(--vscode-panel-border);
      align-items: flex-end;
    }

    #input {
      flex: 1;
      resize: none;
      padding: 8px;
      font-family: inherit;
      font-size: inherit;
      color: var(--vscode-input-foreground);
      background: var(--vscode-input-background);
      border: 1px solid var(--vscode-input-border, transparent);
      border-radius: 4px;
      min-height: 36px;
    }

    #input:focus {
      outline: 1px solid var(--vscode-focusBorder);
    }

    #send {
      padding: 8px 16px;
      cursor: pointer;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 4px;
      font-size: inherit;
    }

    #send:hover {
      background: var(--vscode-button-hoverBackground);
    }

    #send:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #status-bar {
      padding: 4px 12px;
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
    }

    .loading {
      display: none;
      padding: 8px 12px;
      color: var(--vscode-descriptionForeground);
    }

    .loading.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div id="messages" role="log" aria-label="Chat messages" aria-live="polite"></div>
  <div id="loading" class="loading" aria-label="Processing request">Processing...</div>
  <div id="status-bar" role="status" aria-live="polite"></div>
  <div id="input-area">
    <textarea id="input" rows="1" aria-label="Message input" placeholder="Type a message..."></textarea>
    <button id="send" aria-label="Send message">Send</button>
  </div>

  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const loadingEl = document.getElementById('loading');
    const statusBar = document.getElementById('status-bar');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.setAttribute('role', 'article');
      div.setAttribute('aria-label', role + ' message');
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      vscode.postMessage({ type: 'sendMessage', text: text });
      inputEl.value = '';
      sendBtn.disabled = true;
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    window.addEventListener('message', function(event) {
      const msg = event.data;
      switch (msg.type) {
        case 'response':
          addMessage(msg.text, 'assistant');
          sendBtn.disabled = false;
          loadingEl.classList.remove('visible');
          break;
        case 'status':
          statusBar.textContent = msg.message || msg.state;
          if (msg.state === 'processing') {
            loadingEl.classList.add('visible');
            sendBtn.disabled = true;
          } else {
            loadingEl.classList.remove('visible');
            sendBtn.disabled = false;
          }
          break;
        case 'clear':
          messagesEl.innerHTML = '';
          break;
      }
    });

    vscode.postMessage({ type: 'ready' });
  </script>
</body>
</html>
